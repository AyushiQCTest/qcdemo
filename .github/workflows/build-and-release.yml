name: Build and Release qcdemo

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from tag
        id: version
        run: |
          $tag = "${{ github.ref }}" -replace 'refs/tags/', ''
          $version = $tag -replace '^v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Update VERSION file
        run: |
          Write-Output "${{ steps.version.outputs.version }}" | Out-File -NoNewline -Encoding UTF8 VERSION
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller google-cloud-storage
      
      - name: Build executable with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --name qcdemo `
            --icon favicon.ico `
            --add-data "VERSION:." `
            QuantCopierTelegram.py
      
      - name: Set up Firebase credentials
        run: |
          $credentialsJson = @'
          ${{ secrets.FIREBASE_CREDENTIALS }}
          '@
          $credentialsJson | Out-File -FilePath "$env:TEMP\firebase-key.json" -Encoding UTF8
          echo "GOOGLE_APPLICATION_CREDENTIALS=$env:TEMP\firebase-key.json" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
      
      - name: Upload exe to bucket
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bucketPath = "gs://finsentric-website-hosting.firebasestorage.app/v$version"
          
          echo "Uploading qcdemo.exe to: $bucketPath"
          gsutil -m cp dist/qcdemo.exe "$bucketPath/qcdemo.exe" || exit /b 1
          
          echo "Making file public"
          gsutil acl ch -u AllUsers:R "$bucketPath/qcdemo.exe" || true
          
          echo "Verify upload"
          gsutil ls -lh "$bucketPath/qcdemo.exe"
      
      - name: Clean up credentials
        if: always()
        run: |
          Remove-Item -Force -ErrorAction SilentlyContinue "$env:TEMP\firebase-key.json"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/qcdemo.exe
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify deployment
        run: |
          echo "✓ qcdemo v${{ steps.version.outputs.version }} built and uploaded"
          echo "  Location: gs://finsentric-website-hosting.firebasestorage.app/v${{ steps.version.outputs.version }}/qcdemo.exe"
          echo "  Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
